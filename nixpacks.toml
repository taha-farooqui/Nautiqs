# Railway build config — Nixpacks reads this to build the deploy image.
# We need the mongodb PHP extension (not in the default PHP image) so Laravel
# can talk to MongoDB Atlas.

[phases.setup]
nixPkgs = ['php82', 'php82Extensions.mongodb', 'php82Packages.composer', 'nodejs_20']

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader --no-interaction',
    'npm ci',
]

[phases.build]
cmds = [
    'npm run build',
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache',
]

[start]
cmd = 'php -S 0.0.0.0:${PORT:-8000} -t public public/index.php'
