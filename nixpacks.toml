# Railway / Nixpacks build config.
#
# Two things this file does on top of Nixpacks' default PHP detector:
#   1. Adds the `mongodb` PHP extension (Atlas can't be reached without it).
#   2. Forces `npm ci && npm run build` so Vite compiles Tailwind + Livewire JS
#      into public/build/ — that directory is gitignored, so it MUST be built
#      on the server every deploy.
#
# The `'...'` syntax means "keep all of Nixpacks' defaults, append to them."

[phases.setup]
nixPkgs = ['...', 'php82Extensions.mongodb']

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader --no-interaction',
    'npm ci',
]

[phases.build]
cmds = [
    'npm run build',
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache',
]
