# Railway / Nixpacks build config.
#
# Nixpacks' PHP provider builds a custom `php-with-extensions` binary at build
# time. To get the mongodb extension into that binary we set the
# NIXPACKS_PHP_EXTENSIONS env var BEFORE the setup phase runs.
#
# We also override the install/build commands so:
#   1. composer install uses --ignore-platform-req=ext-mongodb (the extension
#      is loaded at runtime, but composer's strict platform check at build time
#      doesn't see it because of how Nixpacks composes the binary).
#   2. npm ci + npm run build always run, so Vite compiles the assets into
#      public/build/ (which is gitignored).

[variables]
NIXPACKS_PHP_VERSION = '8.2'
NIXPACKS_PHP_EXTENSIONS = 'mongodb'

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-req=ext-mongodb',
    'npm ci',
]

[phases.build]
cmds = [
    'npm run build',
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache',
]
