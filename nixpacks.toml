# Railway build config — Nixpacks reads this on top of its automatic PHP detector.
# We only declare what's missing from the default PHP image: the MongoDB extension
# (no default PHP build ships it). Everything else — composer install, npm ci,
# npm run build, the start command — is handled by Nixpacks' built-in PHP provider.

[phases.setup]
aptPkgs = ['...']
nixPkgs = ['...', 'php82Extensions.mongodb']
